<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ERTAZA // Level 21 Unlocked</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* ==============================
           1. CSS Variables & Reset
           ============================== */
        :root {
            --bg-dark: #050509;
            --bg-card: rgba(18, 18, 30, 0.6);
            --primary-accent: #00f2ff; /* Cyan */
            --secondary-accent: #ff0055; /* Pink/Red */
            --text-main: #ffffff;
            --text-muted: #8899ac;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Montserrat', sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling, background is interactive */
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==============================
           2. Particle Canvas (Background)
           ============================== */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Place behind all content */
        }

        /* ==============================
           3. Main Layout & Hero Section
           ============================== */
        main {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            perspective: 1000px; /* For subtle 3D hover effects */
        }

        .main-container {
            width: 90%;
            max-width: 1200px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glitch-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 12vw, 9rem); /* Responsive typography */
            line-height: 0.9;
            text-transform: uppercase;
            position: relative;
            animation: fadeIn var(--ease-out-expo) 1.5s forwards;
            opacity: 0;
            margin-bottom: 2rem;
            color: var(--text-main);
            /* Advanced CSS: Subtle Text Stroke for 'Outclass' look */
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
        }

        /* Accent Gradient for Name */
        .glitch-title .accent {
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* ==============================
           4. Status/Info Section
           ============================== */
        .status-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: var(--text-muted);
            animation: fadeInDown var(--ease-out-expo) 1s 0.8s forwards;
            opacity: 0;
        }

        .status-item span {
            color: var(--primary-accent);
            font-weight: 800;
        }

        /* ==============================
           5. Personal Message Card (Glassmorphism)
           ============================== */
        .wishing-card {
            background: var(--bg-card);
            padding: 3rem 4rem;
            border-radius: 24px;
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            
            /* Professional Glassmorphism effects */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 0 20px rgba(255, 255, 255, 0.02);

            transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s var(--ease-out-expo);
            animation: fadeInUp var(--ease-out-expo) 1.2s 1s forwards;
            opacity: 0;
            overflow: hidden;
            position: relative;
        }

        /* Sublte accent border on top */
        .wishing-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-accent), transparent, var(--secondary-accent));
        }

        .wishing-card:hover {
            transform: translateY(-5px) rotateX(1deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        0 0 15px rgba(0, 242, 255, 0.1);
        }

        /* Custom Typist Text Styling */
        #typist {
            font-size: 1.2rem;
            line-height: 1.8;
            font-weight: 300;
            color: var(--text-muted);
            min-height: 5em; /* Prevent layout shift during typing */
        }

        #typist .highlight {
            color: var(--text-main);
            font-weight: 600;
        }

        #typist .tech-tag {
            color: var(--secondary-accent);
            font-weight: 600;
        }

        /* The typing cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background-color: var(--primary-accent);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        /* ==============================
           6. Professional Interaction Button
           ============================= */
        .deploy-celebration {
            margin-top: 4rem;
            padding: 1.2rem 3rem;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--bg-dark);
            background: #ffffff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s var(--ease-out-expo);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeIn var(--ease-out-expo) 1.5s 2.5s forwards;
            opacity: 0;
        }

        .deploy-celebration::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s var(--ease-out-expo);
        }

        .deploy-celebration:hover {
            background: var(--primary-accent);
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3);
        }

        .deploy-celebration:hover::after {
            left: 100%;
        }

        /* ==============================
           7. Keyframes & Animations
           ============================== */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ==============================
           8. Professional Responsiveness
           ============================== */
        @media (max-width: 768px) {
            .wishing-card {
                padding: 2rem;
            }
            #typist {
                font-size: 1rem;
            }
            .status-bar {
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <main>
        <div class="main-container">
            
            <h1 class="glitch-title">
                Happy<br>Birthday <span class="accent">Ertaza</span>
            </h1>

            <div class="status-bar">
                <div class="status-item">Deployment Date: <span>05 JUNE 2026</span></div>
                <div class="status-item">Core Level: <span>21</span> // ACHIEVED</div>
                <div class="status-item">Current Objective: <span>SYSTEM RESET</span></div>
            </div>

            <div class="wishing-card">
                <p id="typist">
                    </p>
                <span class="cursor"></span>
            </div>

            <button class="deploy-celebration" id="bdayButton">
                Confirm Appreciation
            </button>
            
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        /* =========================================
           PARTICLE ENGINE - Bespoke JS for Backgroud
           ========================================= */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            
            // Adjust particle density based on screen size
            const numberOfParticles = (canvas.width * canvas.height) / 8000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Randomized sizes and speeds for depth
                this.baseSize = (Math.random() * 2) + 0.5;
                this.size = this.baseSize;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.color = Math.random() > 0.1 ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 242, 255, 0.4)';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Handle screen wrap-around (torus topology)
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Professional touch: Particles react to mouse position
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let interactionRadius = 150;
                    
                    if (dist < interactionRadius) {
                        let force = (interactionRadius - dist) / interactionRadius;
                        // Slightly scale up particles near mouse
                        this.size = this.baseSize + (force * 1.5);
                    } else {
                        this.size = this.baseSize;
                    }
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }

        /* Event Listeners for Particle Interactivity */
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('resize', initCanvas);

        // Run Particle Engine
        initCanvas();
        animate();


        /* =========================================
           TYPIST ENGINE - Customized Birthday Wish
           ========================================= */
        const textToType = [
            'System alert: High-priority deployment confirmed.',
            'Target identified: <span class="highlight">Ertaza</span>.',
            'From debugging logic gates to mastering C++ arrays, you have successfully cleared the midterm gauntlet.',
            'Level <span class="highlight">21</span> is now officially unlocked.',
            'Today, we execute a critical system reset. Disable all academic protocols, pause the VU midterms, and minimize complexity.',
            'Your engineering journey is just compiling. Enjoy the mandatory rest, reset your internal clock, and prepare for the next patch deployment (ENG201).',
            'Consider yourself officially celebrated. <span class="tech-tag">// End of Transmission.</span>'
        ];

        const typistElement = document.getElementById('typist');
        let currentPhraseIndex = 0;
        let currentCharIndex = 0;
        let isTag = false; // Advanced: Handle typing speed when encountering HTML tags
        let tagBuffer = '';

        function typeMessage() {
            // Check if there are phrases left to type
            if (currentPhraseIndex < textToType.length) {
                const currentText = textToType[currentPhraseIndex];
                
                // Advanced: Handle typing single character or HTML tag at once
                let charToShow = currentText[currentCharIndex];
                
                if (charToShow === '<') { isTag = true; }
                if (isTag) { tagBuffer += charToShow; } else { tagBuffer = charToShow; }
                if (charToShow === '>') { isTag = false; }

                if (!isTag) {
                    typistElement.innerHTML += tagBuffer;
                    tagBuffer = '';
                    currentCharIndex++;
                    
                    // Natural random variation in typing speed
                    const randomSpeed = Math.random() * (40 - 15) + 15;
                    setTimeout(typeMessage, randomSpeed);
                } else {
                    // Instantly type HTML tags (no delay)
                    currentCharIndex++;
                    typeMessage();
                }

                // Move to next phrase once complete
                if (currentCharIndex === currentText.length) {
                    typistElement.innerHTML += '<br><br>'; // Add spacing between paragraphs
                    currentCharIndex = 0;
                    currentPhraseIndex++;
                    // Delay before typing the next paragraph
                    setTimeout(typeMessage, 800); 
                }
            } else {
                // Remove cursor once typing is complete
                document.querySelector('.cursor').style.display = 'none';
            }
        }

        // Delay typist start for entrance animations
        setTimeout(typeMessage, 2800);


        /* =========================================
           CELEBRATION DEPLOYMENT - Confetti Interaction
           ========================================= */
        const bdayButton = document.getElementById('bdayButton');
        
        bdayButton.addEventListener('click', () => {
            // Update button state visually
            bdayButton.innerText = "System Appreciated ✓";
            bdayButton.style.background = "#fff";
            bdayButton.style.color = "#050509";
            
            // PROFESSIONAL CONFIGURATION: Use external confetti library via standard browser API
            var duration = 4 * 1000;
            var end = Date.now() + duration;

            (function frame() {
              // Standard confetti configuration: realistic gravity, dispersion, and acceleration
              confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00f2ff', '#ffffff'] });
              confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0055', '#ffffff'] });

              // Execute frame loop
              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
            
            // Add initial burst to confirmation
            setTimeout(() => {
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#00f2ff', '#ff0055', '#ffffff'] });
            }, 50);
        });

    </script>
</body>
</html>
